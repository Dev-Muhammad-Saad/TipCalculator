<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h1>Tip Calculator</h1>

    <div class="field">
      <label for="bill">Bill Amount (Rs)</label>
      <input type="number" id="bill" placeholder="e.g. 2500" min="0" />
      <span class="error" id="bill-error"></span>
    </div>

    <div class="field">
      <label>Tip %</label>
      <div class="presets">
        <button class="preset" data-value="10">10%</button>
        <button class="preset" data-value="15">15%</button>
        <button class="preset" data-value="20">20%</button>
      </div>
      <input type="number" id="tip" placeholder="Custom %" min="0" max="100" />
      <span class="error" id="tip-error"></span>
    </div>

    <div class="field">
      <label for="people">Number of People</label>
      <input type="number" id="people" placeholder="e.g. 4" min="1" value="1" />
      <span class="error" id="people-error"></span>
    </div>

    <div class="results">
      <div class="result-row">
        <span>Tip Amount</span>
        <span id="tip-amount">Rs —</span>
      </div>
      <div class="result-row">
        <span>Grand Total</span>
        <span id="grand-total">Rs —</span>
      </div>
      <div class="result-row highlight">
        <span>Per Person</span>
        <span id="per-person">Rs —</span>
      </div>
    </div>

    <button id="reset">Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
